name: Collect listings

on:
  # 스케줄 제거: 네이버가 부동산 호스트(new.land/m.land/fin.land)를 해외 데이터센터
  # IP에서 네트워크 레벨로 차단해 러너에서는 접속 자체가 불가능하다 (2026-07-19 진단:
  # www.naver.com은 200, new.land는 TCP 타임아웃). 정기 수집은 로컬 작업 스케줄러
  # "MiareCollect"(07:10/18:10 KST, collect_and_push.bat)가 담당한다.
  # 아래 수동 트리거는 참고용으로만 남긴다 (한국 IP 러너/프록시 확보 전까지는 실패함).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install collector deps
        run: |
          pip install -r collector/requirements.txt
          playwright install chromium --with-deps
      - name: Collect
        run: python collector/collect.py
      - name: Commit updated data
        run: |
          git config user.name "miare-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/listings.json
          if git diff --cached --quiet; then
            echo "변경 없음 - 커밋 생략"
          else
            git commit -m "data: 매물 자동 수집 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M')"
            git push
          fi
