name: Collect listings

on:
  schedule:
    # KST 07:00 / 18:00 (UTC 22:00 / 09:00)
    - cron: '0 22 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install collector deps
        run: |
          pip install -r collector/requirements.txt
          playwright install chromium --with-deps
      - name: Collect
        run: python collector/collect.py
      - name: Commit updated data
        run: |
          git config user.name "miare-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/listings.json
          if git diff --cached --quiet; then
            echo "변경 없음 - 커밋 생략"
          else
            git commit -m "data: 매물 자동 수집 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M')"
            git push
          fi
